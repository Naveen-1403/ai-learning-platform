<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* login.html CSS அப்படியே */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #0b0f19; color: white; overflow: hidden; position: relative; }
        
        #particleCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .login-box { position: relative; z-index: 10; width: 450px; background: rgba(17, 24, 39, 0.85); backdrop-filter: blur(12px); padding: 50px 40px; border-radius: 24px; border: 1px solid rgba(0, 242, 254, 0.2); box-shadow: 0 0 40px rgba(0, 242, 254, 0.1); text-align: center; }
        
        .brand-title { margin-bottom: 25px; }
        .brand-title h1 { font-size: 38px; font-weight: 800; color: #fff; letter-spacing: 2px; margin-bottom: 5px; text-transform: uppercase; }
        .brand-title .highlight { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
        .brand-title .tagline { font-size: 12px; color: #00f2fe; letter-spacing: 4px; text-transform: uppercase; font-weight: 500; }
        
        .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(0, 242, 254, 0.3), transparent); margin: 25px 0; }

        .login-box h2 { font-size: 22px; font-weight: 600; margin-bottom: 25px; color: #e5e7eb; }

        .input-box { position: relative; margin-bottom: 25px; }
        .input-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #6b7280; font-size: 16px; transition: 0.3s; }
        .input-box input { width: 100%; padding: 16px 16px 16px 50px; background: rgba(0, 0, 0, 0.6); border: 1px solid #374151; border-radius: 12px; font-size: 15px; color: white; outline: none; transition: 0.3s; }
        .input-box input::placeholder { color: #6b7280; }
        
        .input-box input:focus { border-color: #00f2fe; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); background: rgba(0, 0, 0, 0.8); }
        .input-box input:focus + i { color: #00f2fe; }

        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #000; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { box-shadow: 0 0 20px rgba(0, 242, 254, 0.5); transform: translateY(-2px); }

        .bottom-link { margin-top: 30px; font-size: 14px; color: #9ca3af; }
        .bottom-link a { color: #00f2fe; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .bottom-link a:hover { text-shadow: 0 0 10px rgba(0, 242, 254, 0.8); color: #fff; }
        
        .msg { font-size: 13px; margin-bottom: 20px; padding: 12px; border-radius: 8px; display: none; font-weight: 500; }
        .error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); display: block; }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="login-box">
        <div class="brand-title">
            <h1><span class="highlight">AI</span> Platform</h1>
            <p class="tagline">Next-Gen Learning Space</p>
        </div>
        
        <div class="divider"></div>
        
        <h2>Create Account</h2>
        
        <div id="status-msg" class="msg"></div>
        
        <form action="/api/auth/register" method="post">
            <div class="input-box">
                <input type="text" name="username" placeholder="Choose Username" required>
                <i class="fas fa-user-astronaut"></i>
            </div>
            <div class="input-box">
                <input type="password" name="password" placeholder="Create Password" required>
                <i class="fas fa-lock"></i>
            </div>
            <button type="submit">Register Now</button>
        </form>
        
        <div class="bottom-link">
            Already registered? <a href="login.html">Login Here</a>
        </div>
    </div>

    <script>
        if (new URLSearchParams(window.location.search).has('error')) {
            const msg = document.getElementById('status-msg');
            msg.innerText = "Username already exists!"; 
            msg.className = "msg error";
        }

        // Particle Animation Logic
        const canvas = document.getElementById("particleCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        const colors = ['#00f2fe', '#4facfe', '#ffffff'];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if(this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            for (let i = 0; i < 80; i++) { particlesArray.push(new Particle()); }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
                for (let j = i; j < particlesArray.length; j++) {
                    const dx = particlesArray[i].x - particlesArray[j].x;
                    const dy = particlesArray[i].y - particlesArray[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 100) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 242, 254, ${1 - distance/100})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
                        ctx.lineTo(particlesArray[j].x, particlesArray[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        init();
        animate();
    </script>
</body>
</html>
